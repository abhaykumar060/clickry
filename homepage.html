<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }

    .landing-page{
      position:relative;
      width:100%;
      min-height:1024px;
      background:#000;
      color:#fff;
    }

    /* Main Wrapper */
    .frame-615{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:133px;
      width:100%;
    }

    /* Navbar */
    .navbar{
      width:100%;
      height:80px;
      background:#0B0C0E;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 90px;
    }

    .logo img{
      width:141px;
      height:45px;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      gap:24px;
      list-style:none;
    }

    .nav-links li a{
      text-decoration:none;
      font-size:20px;
      font-weight:600;
      color:#A1A1AA;
      transition:0.3s;
    }

    .nav-links li a.active,
    .nav-links li a:hover{
      color:#fff;
    }

    .btn-primary{
      background:#FF8A00;
      color:#fff;
      border:none;
      padding:10px 24px;
      border-radius:7px;
      font-size:20px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn-primary:hover{
      background:#e47700;
    }

    /* Hero Section */
    .hero{
      position: relative;
     width: 100%;
     min-height: calc(100vh - 80px);

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 40px 6%;
    gap: 40px;

  overflow: hidden;
    }

    /* Left Content */
    .hero-content{
      position:relative;
      width:602px;
      z-index:2;
    }

    .tag{
      display:inline-block;
      padding:10px 18px;
      border:1px solid #323131;
      border-radius:50px;
      color:#E25E25;
      font-size:20px;
      margin-bottom:30px;
    }

    .hero-title{
      font-size:60px;
      line-height:72px;
      font-weight:600;
      color:#fff;
      margin-bottom:40px;
    }

    .hero-description{
      width:466px;
      font-size:20px;
      line-height:33px;
      color:#9B9CA2;
      margin-bottom:40px;
    }

    .hero-buttons{
      display:flex;
      gap:16px;
    }

    .btn-orange{
      background:#ED750D;
      color:#fff;
      border:none;
      padding:10px 24px;
      border-radius:7px;
      font-size:20px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-dark{
      background:#232326;
      color:#fff;
      border:none;
      padding:10px 24px;
      border-radius:7px;
      font-size:20px;
      font-weight:600;
      cursor:pointer;
    }

    /* Right Image */
    .hero-image{
      position:relative;
      z-index:2;
    }

    .hero-image img{
      width:756px;
      height:504px;
      object-fit:contain;
    }

    /* Glow Effects */
    .ellipse-1,
    .ellipse-2{
      position:absolute;
      border-radius:50%;
      filter:blur(75px);
      z-index:1;
    }

    .ellipse-1{
      width:331px;
      height:327px;
      left:55%;
      top:170px;
      background:radial-gradient(circle,
      rgba(255,138,0,0.25) 0%,
      rgba(255,138,0,0) 100%);
    }

    .ellipse-2{
      width:331px;
      height:314px;
      right:50px;
      top:10px;
      background:radial-gradient(circle,
      rgba(255,138,0,0.5) 0%,
      rgba(255,138,0,0) 100%);
    }

    /* Floating Logo */
    .floating-logo{
      position:absolute;
      width:80px;
      right:430px;
      bottom:90px;
      transform:rotate(6deg);
      z-index:3;
    }

    /* Responsive */
    @media(max-width:1200px){

      .hero{
        flex-direction:column;
        height:auto;
        text-align:center;
        gap:50px;
      }

      .hero-content{
        width:100%;
      }

      .hero-description{
        width:100%;
      }

      .hero-buttons{
        justify-content:center;
      }

      .hero-image img{
        width:100%;
        height:auto;
      }

      .navbar{
        flex-direction:column;
        height:auto;
        padding:20px;
        gap:20px;
      }

      .nav-links{
        flex-wrap:wrap;
        justify-content:center;
      }
    }

    @media(max-width:768px){

      .hero-title{
        font-size:42px;
        line-height:54px;
      }

      .hero-description{
        font-size:18px;
      }

      .btn-primary,
      .btn-orange,
      .btn-dark{
        font-size:16px;
      }

      .hero-buttons{
        flex-direction:column;
      }
    }

  </style>
</head>
<body>

  <div class="landing-page">

    <div class="frame-615">

      <!-- Navbar -->
      <nav class="navbar">

        <div class="logo">
         <img 
        src="files/Logo.png" 
        alt="Logo"
         style="width:250px; 
         height:auto;"
        >
        </div>

           

        <ul class="nav-links">
          <li><a href="homepage.html" class="active">Home</a></li>
          <li><a href="casestudy.html">Case Study</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="aboutus.html">About Us</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>

        <button class="btn-primary">
          Get Started
        </button>

      </nav>

      <!-- Hero Section -->
      <section class="hero">

        <!-- Glow Effects -->
        <div class="ellipse-1"></div>
        <div class="ellipse-2"></div>

        <!-- Left Content -->
        <div class="hero-content">

          <div class="tag">
            PERFORMANCE MARKETING AGENCY
          </div>

          <h1 class="hero-title">
            We Focus on Results Not Just Marketing.
          </h1>

          <p class="hero-description">
            Helping brands scale with data-driven marketing,
            not guesswork.
          </p>

          <div class="hero-buttons">
            <button class="btn-orange">
             Book Free Strategy Call 
            </button>

            <button class="btn-dark">
              View Case Study
            </button>
          </div>

        </div>

        <!-- Right Image -->
        <div class="hero-image">
          <img
            src="files\Marketing_Hero-removebg-preview.png"
            alt="Marketing Hero Image"
          >
        </div>

        

      </section>

    </div>

  </div>

</body>
</html>
