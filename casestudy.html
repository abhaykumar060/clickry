<section 
  id="case-study"
  style="
    position: relative;
    width: 100%;
    min-height: 1024px;
    background: #000000;
    overflow: hidden;
    padding: 180px 120px;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
  "
>

  <!-- Left Content -->
  <div style="
    max-width: 520px;
    position: relative;
    z-index: 2;
  ">

    <p style="
      color: #FF8A00;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
    ">
      CASE STUDY
    </p>

    <h1 style="
      color: #FFFFFF;
      font-size: 42px;
      line-height: 1.3;
      font-weight: 600;
      margin-bottom: 30px;
    ">
      +45 Leads in 30 Days
    </h1>

    <p style="
      color: #A1A1AA;
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 40px;
    ">
      We helped a real estate brand generate qualified leads with a focused paid advertising strategy.
    </p>

    <!-- Points -->
    <div style="
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 25px;
    ">
      <div style="
        width: 8px;
        height: 8px;
        background: #ED750D;
        border-radius: 50%;
      "></div>

      <p style="
        color: #A1A1AA;
        font-size: 20px;
        margin: 0;
      ">
        2L pipeline generated
      </p>
    </div>

    <div style="
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 25px;
    ">
      <div style="
        width: 8px;
        height: 8px;
        background: #ED750D;
        border-radius: 50%;
        opacity: .7;
      "></div>

      <p style="
        color: #A1A1AA;
        font-size: 20px;
        margin: 0;
      ">
        3x ROI on campaigns
      </p>
    </div>

    <div style="
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 50px;
    ">
      <div style="
        width: 8px;
        height: 8px;
        background: #ED750D;
        border-radius: 50%;
      "></div>

      <p style="
        color: #A1A1AA;
        font-size: 20px;
        margin: 0;
      ">
        Higher quality inbound leads
      </p>
    </div>

    <!-- Button -->
    <a 
      href="#"
      style="
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 263px;
        height: 46px;
        background: #FF8A00;
        border-radius: 7px;
        color: white;
        text-decoration: none;
        font-size: 20px;
        font-weight: 600;
      "
    >
      View Full Case Study
    </a>

  </div>

  <!-- Right Image -->
  <div style="
    position: absolute;
    right: 5%;
    top: 25%;
    z-index: 2;
    width: 40%;
  ">
    <img 
      src="files\overviews.png"
      alt="Case Study Dashboard"
      style="
        width: 100%;
        max-width: 650px;
      "
    >
  </div>

</section>
